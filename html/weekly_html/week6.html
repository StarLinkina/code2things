                <h3>学习内容</h3>
                <p>本周学习了基础的ESP32的入门开发</p>
                <p>包含了选择开发板、端口选择、代码编写、程序上传以及串口监视器的使用</p>

                <h3>遇到的问题</h3>
                <p>在选择开发板时：由于对自己板的不熟悉，导致一开始选择了错误的板（ESP32 DEV MODULE）</p>
                <p>在代码编写时：没有注意自己板上的引脚编号，导致程序和硬件之间连接失败</p>
                <p>在程序上传时：我使用的esp32-s2需要先长按BOOT，按一下SETUP，再松开BOOT才能烧录</p>

                <h3>完成的工作</h3>
