                <p>本周学习了嘉立创EDA的基础操作</p>

                <h3>遇到的问题</h3>
                <p>在绘制原理图时：由于操作不熟悉，常常犯连线不准，导致引脚悬空的错误</p>

                <p>在设计PCB时：不知道怎么把图片放到PCB板上，之后通过AI的帮助学会了</p>
